name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          matrix=$(python3 -c "
          import yaml, json
          with open('build.yaml') as f:
              data = yaml.safe_load(f)
          print(json.dumps({'include': data['include']}))
          ")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install west and dependencies
        run: |
          pip3 install west

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.9/zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz -C /opt
          /opt/zephyr-sdk-0.16.9/setup.sh -t arm-zephyr-eabi -c

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            zephyr/
            zmk/
            zmk-helpers/
            zmk-keyboard-cornix/
          key: west-${{ hashFiles('config/west.yml') }}

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Install Zephyr Python dependencies
        run: pip3 install -r zephyr/scripts/requirements.txt

      - name: West Build
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ matrix.shield }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -DSHIELD=\"${{ matrix.shield }}\""
          fi
          if [ -n "${{ matrix.snippet }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -DSNIPPET=\"${{ matrix.snippet }}\""
          fi
          west build -s zmk/app -b "${{ matrix.board }}" \
            -- -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            $EXTRA_ARGS

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          if [ -f build/zephyr/zmk.uf2 ]; then
            cp build/zephyr/zmk.uf2 "artifacts/${{ matrix.artifact-name }}.uf2"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: firmware
          pattern: "*"
